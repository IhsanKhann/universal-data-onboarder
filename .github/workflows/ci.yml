name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          path: universal-data-onboarder

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Checkout testbed
        uses: actions/checkout@v4
        with:
          repository: IhsanKhann/universal-data-onboarder-testbed
          path: universal-data-onboarder-testbed

      - name: Install engine dependencies
        run: npm install --no-fund --loglevel=error
        working-directory: universal-data-onboarder

      - name: Install testbed dependencies
        run: npm install --no-fund --loglevel=error
        working-directory: universal-data-onboarder-testbed

      - name: Run Jest tests (engine)
        run: npm test
        working-directory: universal-data-onboarder

      - name: Run native e2e tests (testbed)
        run: node tests/e2e-native-runner.mjs
        working-directory: universal-data-onboarder-testbed
        continue-on-error: ${{ matrix.node-version == 22 }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            universal-data-onboarder/test-results/**
            universal-data-onboarder/TEST_OUTPUT.md
