# Universal Data Onboarding Engine — npm publish workflow
#
# Triggered only on pushing a tag matching v*.*.* (e.g. v0.1.0).
# Runs tests, then publishes each workspace package to npm.
#
# Manual trigger: git tag v0.1.0 && git push --tags

name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspaces --if-present

  publish-core:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish core package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    needs: test
    runs-on: ubuntu-latest
    if: false # Testbed is a private/internal tool — not published to npm
    steps:
      - uses: actions/checkout@v4
        with:
          repository: IhsanKhann/universal-data-onboarder-testbed

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Dry run (testbed is not published)
        run: npm publish --dry-run
