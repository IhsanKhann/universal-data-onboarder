# Universal Data Onboarding Engine — GitHub Pages deployment
#
# On every push to master that touches docs-site/**, packages/react-ui/**,
# or .github/workflows/pages.yml, builds the VitePress docs site AND the
# React UI demo, then deploys both to GitHub Pages.
#
# Docs are served at /, and the react-ui demo at /demo/.

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "docs-site/**"
      - "packages/react-ui/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-fund --loglevel=error

      - name: Build VitePress site
        run: npm run docs:build

      - name: Build React UI demo
        working-directory: ./packages/react-ui
        run: |
          npm install --no-fund --loglevel=error
          npm run build

      - name: Combine outputs for Pages
        run: |
          mkdir -p _deploy/demo
          cp -r .vitepress/dist/* _deploy/
          cp -r ../packages/react-ui/dist/* _deploy/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/_deploy

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
